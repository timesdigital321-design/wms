<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MS Warehouse — WMS</title>
<style>
/* ─── Design Tokens ─────────────────────────────────────────────────────────── */
:root {
  --ink:        #0D1B2A;
  --ink-2:      #2C3E50;
  --ink-3:      #556070;
  --ink-4:      #8898AA;
  --surface:    #F7F9FC;
  --surface-2:  #EDF1F7;
  --surface-3:  #E2E8F0;
  --white:      #FFFFFF;
  --accent:     #1F6FD0;
  --accent-2:   #1558A8;
  --accent-glow:#D6E8FB;
  --green:      #0F9D58;
  --green-bg:   #E8F5EF;
  --red:        #D93025;
  --red-bg:     #FDECEA;
  --amber:      #F9A825;
  --amber-bg:   #FFF8E1;
  --radius:     8px;
  --radius-lg:  14px;
  --shadow:     0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
  --shadow-sm:  0 1px 3px rgba(0,0,0,.07);
  --sidebar-w:  240px;
  --font:       'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:  'JetBrains Mono', 'Fira Mono', monospace;
  --transition: .18s ease;
}

/* ─── Base ──────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; font-family:var(--font); background:var(--surface); color:var(--ink); font-size:14px; line-height:1.5; }
a { color:var(--accent); text-decoration:none; }
button { cursor:pointer; font-family:var(--font); }
input, select, textarea { font-family:var(--font); font-size:14px; }
*:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }

/* ─── Login Screen ──────────────────────────────────────────────────────────── */
#login-screen {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; background:linear-gradient(145deg, #0D1B2A 0%, #1F4E79 100%);
}
.login-card {
  background:var(--white); border-radius:var(--radius-lg);
  padding:44px 40px; width:100%; max-width:400px;
  box-shadow:0 24px 64px rgba(0,0,0,.28);
}
.login-logo { text-align:center; margin-bottom:32px; }
.login-logo .logo-mark {
  width:56px; height:56px; background:var(--accent);
  border-radius:14px; display:inline-flex; align-items:center; justify-content:center;
  margin-bottom:14px;
}
.login-logo .logo-mark svg { color:white; }
.login-logo h1 { font-size:22px; font-weight:700; color:var(--ink); letter-spacing:-.4px; }
.login-logo p  { font-size:13px; color:var(--ink-3); margin-top:4px; }
.form-field { margin-bottom:18px; }
.form-field label { display:block; font-size:12px; font-weight:600; color:var(--ink-2); margin-bottom:6px; letter-spacing:.04em; text-transform:uppercase; }
.form-field input {
  width:100%; padding:10px 13px; border:1.5px solid var(--surface-3);
  border-radius:var(--radius); transition:border var(--transition), box-shadow var(--transition);
  background:var(--surface); color:var(--ink);
}
.form-field input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); outline:none; }
.btn-primary {
  width:100%; padding:11px; background:var(--accent); color:white;
  border:none; border-radius:var(--radius); font-size:14px; font-weight:600;
  transition:background var(--transition), transform .1s;
}
.btn-primary:hover { background:var(--accent-2); }
.btn-primary:active { transform:scale(.98); }
.login-error { background:var(--red-bg); color:var(--red); padding:10px 12px; border-radius:var(--radius); font-size:13px; margin-bottom:16px; display:none; }

/* ─── App Shell ─────────────────────────────────────────────────────────────── */
#app { display:none; height:100vh; overflow:hidden; flex-direction:row; }
#app.active { display:flex; }

/* ─── Sidebar ───────────────────────────────────────────────────────────────── */
.sidebar {
  width:var(--sidebar-w); background:var(--ink); color:white;
  display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto;
  height:100vh;
}
.sidebar-header {
  padding:20px 20px 16px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.sidebar-brand { display:flex; align-items:center; gap:11px; }
.sidebar-brand .brand-icon {
  width:36px; height:36px; background:var(--accent);
  border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.sidebar-brand-text h2 { font-size:14px; font-weight:700; letter-spacing:-.2px; }
.sidebar-brand-text p  { font-size:11px; color:rgba(255,255,255,.45); }

.sidebar-user {
  display:flex; align-items:center; gap:10px;
  padding:14px 20px; border-bottom:1px solid rgba(255,255,255,.08);
  margin-bottom:8px;
}
.user-avatar {
  width:32px; height:32px; border-radius:50%;
  background:var(--accent); display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; flex-shrink:0;
}
.user-info { flex:1; min-width:0; }
.user-info .name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-info .role { font-size:11px; color:rgba(255,255,255,.45); }

.sidebar-nav { flex:1; padding:4px 10px; }
.nav-group-label {
  font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:rgba(255,255,255,.3); padding:12px 10px 6px;
}
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:7px; cursor:pointer;
  color:rgba(255,255,255,.65); font-size:13px; font-weight:500;
  transition:background var(--transition), color var(--transition);
  margin-bottom:1px;
}
.nav-item:hover { background:rgba(255,255,255,.07); color:white; }
.nav-item.active { background:var(--accent); color:white; }
.nav-item svg { flex-shrink:0; }

.sidebar-footer { padding:12px 20px; border-top:1px solid rgba(255,255,255,.08); }
.btn-logout {
  width:100%; display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.07); border:none; color:rgba(255,255,255,.65);
  padding:8px 12px; border-radius:7px; font-size:13px;
  transition:background var(--transition), color var(--transition);
}
.btn-logout:hover { background:rgba(255,255,255,.14); color:white; }

/* ─── Main Content ──────────────────────────────────────────────────────────── */
.main-content { flex:1; overflow-y:auto; display:flex; flex-direction:column; min-width:0; }
.page-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:24px 28px 16px; border-bottom:1px solid var(--surface-3);
  background:var(--white); position:sticky; top:0; z-index:10;
}
.page-header h1 { font-size:20px; font-weight:700; letter-spacing:-.3px; }
.page-header .subtitle { font-size:13px; color:var(--ink-3); margin-top:2px; }
.header-actions { display:flex; gap:8px; align-items:center; }

.page-body { padding:24px 28px; flex:1; }

/* ─── Buttons ───────────────────────────────────────────────────────────────── */
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 16px; border-radius:var(--radius); font-size:13px; font-weight:600;
  border:1.5px solid transparent; transition:all var(--transition); cursor:pointer;
  white-space:nowrap;
}
.btn-sm { padding:5px 11px; font-size:12px; }
.btn-accent { background:var(--accent); color:white; border-color:var(--accent); }
.btn-accent:hover { background:var(--accent-2); border-color:var(--accent-2); }
.btn-ghost { background:transparent; color:var(--ink-2); border-color:var(--surface-3); }
.btn-ghost:hover { background:var(--surface-2); border-color:var(--surface-3); }
.btn-danger { background:var(--red-bg); color:var(--red); border-color:transparent; }
.btn-danger:hover { background:var(--red); color:white; }
.btn-green { background:var(--green-bg); color:var(--green); border-color:transparent; }
.btn-green:hover { background:var(--green); color:white; }
.btn-icon { padding:6px; border-radius:6px; }
.btn:disabled { opacity:.5; cursor:not-allowed; }

/* ─── Cards ─────────────────────────────────────────────────────────────────── */
.card {
  background:var(--white); border-radius:var(--radius-lg);
  border:1px solid var(--surface-3); box-shadow:var(--shadow-sm);
}
.card-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; border-bottom:1px solid var(--surface-3);
}
.card-header h3 { font-size:14px; font-weight:700; }
.card-body { padding:20px; }

/* ─── Stat Cards ─────────────────────────────────────────────────────────────── */
.stat-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:14px; margin-bottom:24px; }
.stat-card {
  background:var(--white); border:1px solid var(--surface-3);
  border-radius:var(--radius-lg); padding:18px 20px;
  display:flex; flex-direction:column; gap:6px;
}
.stat-card .stat-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-4); }
.stat-card .stat-value { font-size:28px; font-weight:800; letter-spacing:-1px; color:var(--ink); line-height:1; }
.stat-card .stat-sub { font-size:12px; color:var(--ink-3); }
.stat-card .stat-icon {
  width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center;
  margin-bottom:6px;
}
.stat-icon.blue  { background:var(--accent-glow); color:var(--accent); }
.stat-icon.green { background:var(--green-bg); color:var(--green); }
.stat-icon.amber { background:var(--amber-bg); color:var(--amber); }
.stat-icon.red   { background:var(--red-bg); color:var(--red); }

/* ─── Table ─────────────────────────────────────────────────────────────────── */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th {
  text-align:left; padding:10px 14px;
  background:var(--surface); font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:.06em; color:var(--ink-3);
  border-bottom:1px solid var(--surface-3);
  white-space:nowrap;
}
tbody tr { border-bottom:1px solid var(--surface-2); transition:background var(--transition); }
tbody tr:hover { background:var(--surface); }
tbody td { padding:11px 14px; color:var(--ink-2); vertical-align:middle; }
tbody tr:last-child { border-bottom:none; }
.td-mono { font-family:var(--font-mono); font-size:12px; color:var(--ink-3); }

/* ─── Badges ─────────────────────────────────────────────────────────────────── */
.badge {
  display:inline-flex; align-items:center; padding:3px 9px;
  border-radius:99px; font-size:11px; font-weight:600; letter-spacing:.02em;
}
.badge-green  { background:var(--green-bg);  color:var(--green); }
.badge-red    { background:var(--red-bg);    color:var(--red); }
.badge-amber  { background:var(--amber-bg);  color:var(--amber); }
.badge-blue   { background:var(--accent-glow); color:var(--accent); }
.badge-gray   { background:var(--surface-2); color:var(--ink-3); }

/* ─── Forms ─────────────────────────────────────────────────────────────────── */
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.field-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:12px; font-weight:600; color:var(--ink-2); margin-bottom:5px; letter-spacing:.03em; }
.field input, .field select, .field textarea {
  width:100%; padding:9px 12px; border:1.5px solid var(--surface-3);
  border-radius:var(--radius); background:var(--white); color:var(--ink);
  transition:border var(--transition);
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color:var(--accent); outline:none; box-shadow:0 0 0 3px var(--accent-glow);
}
.field textarea { resize:vertical; min-height:72px; }

/* ─── Modal ─────────────────────────────────────────────────────────────────── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(13,27,42,.45);
  display:flex; align-items:center; justify-content:center;
  z-index:1000; padding:20px;
  opacity:0; pointer-events:none; transition:opacity var(--transition);
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--white); border-radius:var(--radius-lg);
  width:100%; max-width:560px; max-height:90vh; overflow-y:auto;
  box-shadow:0 32px 80px rgba(0,0,0,.28);
  transform:translateY(16px); transition:transform var(--transition);
}
.modal-overlay.open .modal { transform:translateY(0); }
.modal-lg { max-width:760px; }
.modal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 22px; border-bottom:1px solid var(--surface-3); position:sticky; top:0; background:white; z-index:1;
}
.modal-header h3 { font-size:16px; font-weight:700; }
.modal-close { background:none; border:none; color:var(--ink-3); cursor:pointer; padding:4px; border-radius:5px; }
.modal-close:hover { background:var(--surface-2); color:var(--ink); }
.modal-body { padding:22px; }
.modal-footer { display:flex; justify-content:flex-end; gap:10px; padding:16px 22px; border-top:1px solid var(--surface-3); }

/* ─── Toolbar ─────────────────────────────────────────────────────────────────── */
.toolbar {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  margin-bottom:16px;
}
.search-box {
  flex:1; min-width:200px; position:relative;
}
.search-box input {
  width:100%; padding:8px 12px 8px 36px;
  border:1.5px solid var(--surface-3); border-radius:var(--radius);
  background:var(--white); font-size:13px;
}
.search-box input:focus { border-color:var(--accent); outline:none; box-shadow:0 0 0 3px var(--accent-glow); }
.search-box .search-icon {
  position:absolute; left:10px; top:50%; transform:translateY(-50%);
  color:var(--ink-4); pointer-events:none;
}
.filter-select {
  padding:8px 12px; border:1.5px solid var(--surface-3);
  border-radius:var(--radius); background:var(--white); font-size:13px; color:var(--ink-2);
}
.filter-select:focus { border-color:var(--accent); outline:none; }

/* ─── Bulk selection ─────────────────────────────────────────────────────────── */
.bulk-bar {
  display:none; background:var(--ink); color:white;
  padding:10px 16px; border-radius:var(--radius); margin-bottom:12px;
  align-items:center; gap:12px; font-size:13px;
}
.bulk-bar.show { display:flex; }
.bulk-bar .bulk-count { font-weight:700; }
.bulk-spacer { flex:1; }

/* ─── Toast ─────────────────────────────────────────────────────────────────── */
#toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
.toast {
  display:flex; align-items:center; gap:10px;
  background:var(--ink); color:white; padding:12px 18px;
  border-radius:var(--radius); box-shadow:var(--shadow);
  font-size:13px; animation:slideIn .2s ease;
  min-width:240px; max-width:360px;
}
.toast.success { border-left:3px solid var(--green); }
.toast.error   { border-left:3px solid var(--red); }
.toast.info    { border-left:3px solid var(--accent); }
@keyframes slideIn { from { opacity:0; transform:translateY(12px); } }

/* ─── Loading / Empty ────────────────────────────────────────────────────────── */
.loading { text-align:center; padding:48px; color:var(--ink-3); }
.loading .spinner {
  width:28px; height:28px; border:3px solid var(--surface-3);
  border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin { to { transform:rotate(360deg); } }
.empty-state { text-align:center; padding:56px 20px; color:var(--ink-3); }
.empty-state svg { margin-bottom:16px; opacity:.35; }
.empty-state h3 { font-size:15px; color:var(--ink-2); margin-bottom:6px; }
.empty-state p  { font-size:13px; }

/* ─── Customer Cards (Dashboard) ─────────────────────────────────────────────── */
.customer-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:12px; }
.customer-card {
  background:var(--white); border:1px solid var(--surface-3); border-radius:var(--radius-lg);
  padding:14px 16px; cursor:pointer; transition:border-color var(--transition), box-shadow var(--transition);
}
.customer-card:hover { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.customer-card .cc-name { font-weight:700; font-size:14px; margin-bottom:2px; }
.customer-card .cc-user { font-size:11px; color:var(--ink-3); }
.customer-card .cc-stats { display:flex; gap:14px; margin-top:10px; }
.customer-card .cc-stat { font-size:12px; color:var(--ink-3); }
.customer-card .cc-stat strong { color:var(--ink); font-weight:700; }

/* ─── Two-row admin table ─────────────────────────────────────────────────────── */
.row-name  { font-weight:600; color:var(--ink); }
.row-user  { font-size:11px; color:var(--ink-3); }

/* ─── Dashboard layout ───────────────────────────────────────────────────────── */
.dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.dash-col  { display:flex; flex-direction:column; gap:16px; }
@media (max-width:900px) { .dash-grid { grid-template-columns:1fr; } }

/* ─── Activity Log ───────────────────────────────────────────────────────────── */
.log-list { display:flex; flex-direction:column; }
.log-item {
  display:flex; align-items:flex-start; gap:12px;
  padding:12px 0; border-bottom:1px solid var(--surface-2);
}
.log-item:last-child { border-bottom:none; }
.log-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--accent); flex-shrink:0; margin-top:5px;
}
.log-dot.error  { background:var(--red); }
.log-dot.warning{ background:var(--amber); }
.log-meta { font-size:12px; color:var(--ink-3); }
.log-action { font-weight:600; color:var(--ink); font-size:13px; }

/* ─── Progress/stock bar ─────────────────────────────────────────────────────── */
.stock-bar { height:4px; background:var(--surface-3); border-radius:2px; overflow:hidden; margin-top:6px; }
.stock-bar-fill { height:100%; border-radius:2px; transition:width .4s; }
.fill-ok     { background:var(--green); }
.fill-low    { background:var(--amber); }
.fill-out    { background:var(--red); }

/* ─── Tab Bar ─────────────────────────────────────────────────────────────────── */
.tabs { display:flex; gap:2px; border-bottom:1px solid var(--surface-3); margin-bottom:20px; }
.tab-btn {
  padding:9px 18px; border:none; background:none; font-size:13px;
  font-weight:600; color:var(--ink-3); cursor:pointer; border-bottom:2px solid transparent;
  transition:color var(--transition);
}
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-btn:hover  { color:var(--ink); }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* ─── Misc ───────────────────────────────────────────────────────────────────── */
.divider { height:1px; background:var(--surface-3); margin:16px 0; }
.text-muted { color:var(--ink-4); font-size:12px; }
.text-danger { color:var(--red); }
.fw700 { font-weight:700; }
.nowrap { white-space:nowrap; }
.check-all { cursor:pointer; }


/* ============================================================================
   UI refresh from wms_improved.html, adapted to the existing WMS app only.
   Login/auth remains the original implementation above.
============================================================================ */
:root {
  --navy:      #1E3A5F;
  --navy-dark: #152D4A;
  --accent:    #2563EB;
  --accent-2:  #1D4ED8;
  --accent-glow:#EFF6FF;
  --green:     #059669;
  --green-bg:  #ECFDF5;
  --red:       #DC2626;
  --red-bg:    #FEF2F2;
  --amber:     #D97706;
  --amber-bg:  #FFFBEB;
  --purple:    #7C3AED;
  --purple-bg: #F5F3FF;
  --surface:   #F1F5F9;
  --surface-2: #F8FAFC;
  --surface-3: #E2E8F0;
  --white:     #FFFFFF;
  --ink:       #0F172A;
  --ink-2:     #475569;
  --ink-3:     #64748B;
  --ink-4:     #94A3B8;
  --radius:    10px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow:    0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -1px rgba(0,0,0,.04);
  --shadow-md: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -2px rgba(0,0,0,.04);
  --header-h: 64px;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
}

html { font-size:15px; }
body { background:var(--surface); color:var(--ink); line-height:1.6; overflow-x:hidden; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#CBD5E1; border-radius:99px; }

#app { background:var(--surface); }
.sidebar {
  background:var(--navy);
  overflow:hidden;
  box-shadow:none;
  transition:width var(--transition), transform var(--transition);
}
.sidebar-header {
  min-height:var(--header-h);
  padding:0 16px;
  display:flex;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.sidebar-brand { gap:12px; }
.sidebar-brand .brand-icon {
  width:36px;
  height:36px;
  border-radius:6px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.15);
}
.sidebar-brand-text h2 { font-size:14px; color:#fff; letter-spacing:-.01em; }
.sidebar-brand-text p { font-size:11px; color:rgba(255,255,255,.5); }
.sidebar-user {
  padding:14px 16px;
  margin:0;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.user-avatar {
  width:34px;
  height:34px;
  background:linear-gradient(135deg,#60A5FA,#A78BFA);
  color:#fff;
  font-size:12px;
  letter-spacing:.01em;
}

const API = (path, opts={}) => {
  const token = localStorage.getItem('wms_token');
  return fetch(`/api${path}`, {
    headers: { 'Content-Type':'application/json', ...(token ? {'Authorization':`Bearer ${token}`} : {}), ...opts.headers },
    ...opts
  }).then(async r => {
    const data = await r.json().catch(()=>({}));
    if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
    return data;
  });
};

/* ═══════════════════════════════════════════════════════════════════════════

/* ═══════════════════════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════════════════════ */
function toast(msg, type='info', dur=3200) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success:'✓', error:'✕', info:'ℹ' };
  el.innerHTML = `<span>${icons[type]||''}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(8px)'; el.style.transition='.2s'; setTimeout(()=>el.remove(),200); }, dur);
}

function openModal(title, bodyHtml, footerHtml='', large=false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-footer').innerHTML = footerHtml;
  const box = document.getElementById('modal-box');
  box.classList.toggle('modal-lg', large);
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-close-btn').onclick = closeModal;
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

  { id:'dashboard',  label:'Dashboard',    icon:'dashboard',  module:'Dashboard' },
  { id:'inventory',  label:'Inventory',    icon:'inventory',  module:'Inventory' },
  { id:'stockio',    label:'Stock In/Out', icon:'stockio',    module:'Stock In/Out' },

  { id:'actlog',     label:'Activity Log', icon:'actlog',     module:'Activity Log' },
  { id:'filelog',    label:'File Log',     icon:'actlog',     module:'Activity Log' },
  { id:'export',     label:'Export',       icon:'export',     module:'Export' },
  { id:'admin',      label:'Admin Panel',  icon:'settings',    module:'Admin',     adminOnly:true },
];

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  const isAdmin = currentUser.role === 'Admin';
  const access = currentUser.access || [];
  nav.innerHTML = '';
  for (const item of NAV_ITEMS) {
    if (item.adminOnly && !isAdmin) continue;
    if (!isAdmin && !access.includes(item.module)) continue;
    const el = document.createElement('div');
    el.className = 'nav-item'; el.dataset.page = item.id;
    el.innerHTML = `${icon[item.icon]}<span>${item.label}</span>`;
    el.onclick = () => navigate(item.id);
    nav.appendChild(el);
  }
  document.getElementById('user-name').textContent = currentUser.name;
  document.getElementById('user-role').textContent = currentUser.role;
  document.getElementById('user-avatar').textContent = (currentUser.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  renderPage(page);
}

/* ═══════════════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════════════ */
const fmt = {
  num: n => Number(n||0).toLocaleString('en-SA'),
  sar: n => `SAR ${Number(n||0).toLocaleString('en-SA', {minimumFractionDigits:2, maximumFractionDigits:2})}`,
  date: s => s ? new Date(s).toLocaleDateString('en-SA',{day:'2-digit',month:'short',year:'numeric'}) : '—',
  dt: s => s ? new Date(s).toLocaleString('en-SA',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—',
};

function badge(val, map) {
  const cls = map[val] || 'badge-gray';
  return `<span class="badge ${cls}">${val||'—'}</span>`;
}

function loadingHtml() {
  return `<div class="loading"><div class="spinner"></div><p>Loading…</p></div>`;
}

function emptyHtml(msg='No records found', sub='') {
  return `<div class="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <h3>${msg}</h3><p>${sub}</p>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   PAGE RENDERER
═══════════════════════════════════════════════════════════════════════════ */
function setMain(html) {
  document.getElementById('main-content').innerHTML = `<div class="session-bar" id="session-bar">Session expires in <span class="session-countdown" id="session-countdown">20:00</span></div>${html}`;
  updateSessionCountdown();
}

function renderPage(page) {
  selectedItems.clear();
  const pages = {
    dashboard:  renderDashboard,
    inventory:  renderInventory,
    stockio:    renderStockIO,
    billing:    renderBilling,
    customers:  renderCustomers,
    reports:    renderReports,
    actlog:     renderActivityLog,
    filelog:    renderFileLog,
    export:     renderExport,
    admin:      renderAdminPanel,
  };
  if (pages[page]) pages[page]();
  else setMain(`<div class="page-body"><p>Page not found.</p></div>`);
}

/* ═══════════════════════════════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════════════════════════════ */
async function renderDashboard() {
  setMain(`<div class="page-header"><div><h1>Dashboard</h1><div class="subtitle">Overview of your warehouse operations</div></div></div><div class="page-body">${loadingHtml()}</div>`);
  try {
    const d = await API('/dashboard');
    const s = d.stats;
    const isAdmin = d.is_admin;

    let html = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon blue">${icon.inventory}</div><div class="stat-label">Total SKUs</div><div class="stat-value">${fmt.num(s.total_items)}</div><div class="stat-sub">Inventory items</div></div>
      <div class="stat-card"><div class="stat-icon green">${icon.reports}</div><div class="stat-label">Stock Value</div><div class="stat-value" style="font-size:20px">${fmt.sar(s.total_value)}</div><div class="stat-sub">Total inventory value</div></div>
      <div class="stat-card"><div class="stat-icon green">${icon.stockio}</div><div class="stat-label">Stock In Today</div><div class="stat-value">${fmt.num(s.stock_in_today)}</div><div class="stat-sub">Units received</div></div>
      <div class="stat-card"><div class="stat-icon amber">${icon.stockio}</div><div class="stat-label">Stock Out Today</div><div class="stat-value">${fmt.num(s.stock_out_today)}</div><div class="stat-sub">Units dispatched</div></div>
      <div class="stat-card"><div class="stat-icon blue">${icon.customers}</div><div class="stat-label">Customers</div><div class="stat-value">${fmt.num(s.total_customers)}</div><div class="stat-sub">Active accounts</div></div>
      ${s.low_stock_count > 0 ? `<div class="stat-card"><div class="stat-icon red">${icon.warning}</div><div class="stat-label">Low Stock</div><div class="stat-value text-danger">${fmt.num(s.low_stock_count)}</div><div class="stat-sub">Items below minimum</div></div>` : ''}
      <div class="stat-card"><div class="stat-icon amber">${icon.billing}</div><div class="stat-label">Pending Bills</div><div class="stat-value">${fmt.num(s.pending_bills)}</div><div class="stat-sub">${fmt.sar(s.pending_value)}</div></div>
    </div>`;

    html += `<div class="dash-grid">
      <div class="dash-col">`;

    // Customer breakdown
    if (d.by_customer && d.by_customer.length) {
      html += `<div class="card"><div class="card-header"><h3>Inventory by Customer</h3></div><div class="card-body"><div class="table-wrap"><table>
        <thead><tr><th>Customer</th><th>SKUs</th><th>Total Qty</th><th>Value</th></tr></thead><tbody>`;
      for (const c of d.by_customer) {
        html += `<tr><td class="fw700">${c.customer}</td><td>${fmt.num(c.sku_count)}</td><td>${fmt.num(c.total_qty)}</td><td class="nowrap">${fmt.sar(c.total_value)}</td></tr>`;
      }
      html += `</tbody></table></div></div></div>`;
    }

    if (d.admin_customers_panel && d.admin_customers_panel.length) {
      html += `<div class="card"><div class="card-header"><h3>Customers & Assigned Users</h3></div><div class="card-body"><div class="table-wrap"><table>
        <thead><tr><th>Customer</th><th>Assigned User</th><th>Username</th><th>Status</th></tr></thead><tbody>`;
      for (const c of d.admin_customers_panel) {
        html += `<tr><td class="fw700">${c.customer_name}</td><td>${c.assigned_user_fullname||'--'}</td><td class="td-mono">@${c.assigned_username||'--'}</td><td>${badge(c.status,{Active:'badge-green',Inactive:'badge-red'})}</td></tr>`;
      }
      html += `</tbody></table></div></div></div>`;
    }

    // Low stock
    if (d.low_stock && d.low_stock.length) {
      html += `<div class="card"><div class="card-header"><h3 style="color:var(--red)">${icon.warning} Low Stock Alerts</h3></div><div class="card-body"><div class="table-wrap"><table>
        <thead><tr><th>SKU</th><th>Item</th><th>Customer</th><th>Qty</th><th>Min</th></tr></thead><tbody>`;
      for (const i of d.low_stock) {
        const pct = i.min_level > 0 ? Math.min(100, (i.qty / i.min_level) * 100) : 0;
        html += `<tr>
          <td class="td-mono">${i.sku}</td><td>${i.name}</td><td>${i.customer_name||'—'}</td>
          <td><span class="text-danger fw700">${fmt.num(i.qty)}</span>
            <div class="stock-bar"><div class="stock-bar-fill fill-low" style="width:${pct}%"></div></div></td>
          <td>${fmt.num(i.min_level)}</td></tr>`;
      }
      html += `</tbody></table></div></div></div>`;
    }

    html += `</div><div class="dash-col">`;

    // Recent activity
    html += `<div class="card"><div class="card-header"><h3>Recent Activity</h3></div><div class="card-body"><div class="log-list">`;
    if (d.recent_activity && d.recent_activity.length) {
      for (const t of d.recent_activity) {
        const isIN = t.type === 'IN';
        html += `<div class="log-item">
          <div class="log-dot"></div>
          <div><div class="log-action">${isIN ? '▲' : '▼'} ${t.name||t.sku}</div>
          <div class="log-meta">${t.customer_name ? t.customer_name+' · ' : ''}${fmt.num(t.qty)} units · ${fmt.date(t.date)} · ${t.by}</div></div>
          <span class="badge ${isIN ? 'badge-green':'badge-amber'}" style="margin-left:auto">${t.type}</span></div>`;
      }
    } else { html += emptyHtml('No recent activity'); }
    html += `</div></div></div>`;

    // Admin: user summaries
    if (isAdmin && d.user_summaries && d.user_summaries.length) {
      html += `<div class="card"><div class="card-header"><h3>Team Performance</h3></div><div class="card-body"><div class="table-wrap"><table>
        <thead><tr><th>User</th><th>Customers</th><th>Transactions</th><th>In Today</th><th>Out Today</th></tr></thead><tbody>`;
      for (const u of d.user_summaries) {
        html += `<tr><td><div class="row-name">${u.name}</div><div class="row-user">@${u.username} · ${u.role}</div></td>
          <td>${fmt.num(u.customers)}</td><td>${fmt.num(u.transactions)}</td>
          <td><span class="badge badge-green">${fmt.num(u.stock_in_today)}</span></td>
          <td><span class="badge badge-amber">${fmt.num(u.stock_out_today)}</span></td></tr>`;
      }
      html += `</tbody></table></div></div></div>`;
    }

    html += `</div></div>`;

    document.querySelector('.page-body').innerHTML = html;
  } catch(e) { document.querySelector('.page-body').innerHTML = `<p class="text-danger">Failed to load dashboard: ${e.message}</p>`; }
}

let invData = [];
let invCustomerNames = [];

async function renderInventory() {
  setMain(`
    <div class="page-header">
      <div><h1>Inventory</h1><div class="subtitle">Customer-centric stock management</div></div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" onclick="downloadFile('/api/export/inventory','inventory_export.xlsx')">${icon.export} Export Excel</button>
        <button class="btn btn-ghost btn-sm" onclick="openUploadTemplate('inventory')">${icon.plus} Upload Excel</button>
        <button class="btn btn-ghost btn-sm" onclick="renderInventory()">${icon.refresh} Refresh</button>
        <button class="btn btn-accent btn-sm" onclick="openAddInventory()">${icon.plus} Add Item</button>
      </div>
    </div>
    <div class="page-body">
      <div class="toolbar">
        <div class="search-box"><span class="search-icon">${icon.search}</span><input id="inv-search" placeholder="Search SKU or item name…" oninput="filterInventory()"/></div>
        <select class="filter-select" id="inv-cust-filter" onchange="filterInventory()"><option value="">Select Customer</option></select>
        ${currentUser.role==='Admin'?`<button class="btn btn-ghost btn-sm" onclick="openBulkEdit()">${icon.edit} Bulk Edit</button>
        <button class="btn btn-danger btn-sm" onclick="openBulkDelete()">Bulk Delete</button>`:''}
      </div>
      <div class="bulk-bar" id="inv-bulk-bar">
        <span class="bulk-count" id="inv-sel-count">0 selected</span>
        <button class="btn btn-ghost btn-sm" onclick="bulkEditSelected()">${icon.edit} Edit Selected</button>
        ${currentUser.role==='Admin'?`<button class="btn btn-danger btn-sm" onclick="bulkDeleteSelected()">Delete</button>`:''}
        <span class="bulk-spacer"></span>
        <button class="btn btn-ghost btn-sm" onclick="clearSelection()">Clear</button>
      </div>
      <div class="card"><div class="table-wrap" id="inv-table">${loadingHtml()}</div></div>
    </div>`);
  try {
    [invData, invCustomerNames] = await Promise.all([
      API('/inventory'),
      API('/customers/names')
    ]);
    const sel = document.getElementById('inv-cust-filter');
    for (const n of invCustomerNames) {
      const o = document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o);
    }
    renderInvTable();
  } catch(e) { document.getElementById('inv-table').innerHTML = `<p class="text-danger" style="padding:20px">${e.message}</p>`; }
}

function filterInventory() {
  renderInvTable();
}

function renderInvTable() {
  const q = (document.getElementById('inv-search')||{}).value?.toLowerCase()||'';
  const cust = (document.getElementById('inv-cust-filter')||{}).value||'';
  if (!cust) { document.getElementById('inv-table').innerHTML = emptyHtml('Select a customer','Inventory is shown customer-wise to keep duplicate products separate'); return; }
  let rows = invData.filter(i =>
    (!q || i.name.toLowerCase().includes(q) || (i.sku||'').toLowerCase().includes(q)) &&
    i.customer_name === cust
  );
  if (!rows.length) { document.getElementById('inv-table').innerHTML = emptyHtml('No inventory items found','Add a new item to get started'); return; }
  const isAdmin = currentUser.role === 'Admin';
  let html = `<table><thead><tr>
    <th><input type="checkbox" class="check-all" onchange="toggleAllItems(this)"/></th>
    <th>SKU</th><th>Item Name</th><th>Customer</th><th>Qty</th><th>Unit</th>
    <th>Min Level</th><th>Unit Cost</th><th>Location</th><th>Updated</th><th></th>
  </tr></thead><tbody>`;
  for (const i of rows) {
    const isLow = i.qty < i.min_level;
    const checked = selectedItems.has(i.id) ? 'checked' : '';
    html += `<tr>
      <td><input type="checkbox" value="${i.id}" ${checked} onchange="toggleItem(this,'${i.id}')"/></td>
      <td class="td-mono">${i.sku}</td>
      <td class="fw700">${i.name}</td>
      <td>${i.customer_name||'—'}</td>
      <td>${isLow ? `<span class="text-danger fw700">${fmt.num(i.qty)}</span> <span class="badge badge-red">Low</span>` : fmt.num(i.qty)}</td>
      <td>${i.unit||'PCS'}</td>
      <td>${fmt.num(i.min_level)}</td>
      <td class="nowrap">${fmt.sar(i.unit_cost)}</td>
      <td class="td-mono">${i.location||'—'}</td>
      <td class="text-muted">${fmt.date(i.updated)}</td>
      <td class="nowrap">
        <button class="btn btn-ghost btn-icon btn-sm" onclick='editInventoryItem(${JSON.stringify(i)})'>${icon.edit}</button>
        ${isAdmin?`<button class="btn btn-danger btn-icon btn-sm" onclick="deleteInventoryItem('${i.id}','${i.name}')">${icon.trash}</button>`:''}
      </td></tr>`;
  }
  html += `</tbody></table>`;
  document.getElementById('inv-table').innerHTML = html;
}

function toggleItem(cb, id) {
  if (cb.checked) selectedItems.add(id); else selectedItems.delete(id);
  updateBulkBar('inv-bulk-bar','inv-sel-count');
}
function toggleAllItems(cb) {
  document.querySelectorAll('#inv-table input[type=checkbox][value]').forEach(c => {
    c.checked = cb.checked;
    if (cb.checked) selectedItems.add(c.value); else selectedItems.delete(c.value);
  });
  updateBulkBar('inv-bulk-bar','inv-sel-count');
}
function clearSelection() { selectedItems.clear(); renderInvTable(); updateBulkBar('inv-bulk-bar','inv-sel-count'); }
function updateBulkBar(barId, countId) {
  const bar = document.getElementById(barId);
  const cnt = document.getElementById(countId);
  if (!bar||!cnt) return;
  if (selectedItems.size > 0) { bar.classList.add('show'); cnt.textContent = `${selectedItems.size} selected`; }
  else bar.classList.remove('show');
}

async function openAddInventory() {
  const customers = await API('/customers/names').catch(()=>[]);
  const custOpts = customers.map(c=>`<option>${c}</option>`).join('');
  openModal('Add Inventory Item', `
    <div class="field-row"><div class="field"><label>SKU</label><input id="i-sku" placeholder="ELC-001"/></div>
    <div class="field"><label>Item Name *</label><input id="i-name" placeholder="Motor Controller Unit"/></div></div>
    <div class="field"><label>Customer</label><select id="i-cust"><option value="">— Select Customer —</option>${custOpts}</select></div>
    <div class="field-row">
      <div class="field"><label>Quantity</label><input id="i-qty" type="number" value="0" min="0"/></div>
      <div class="field"><label>Unit</label><select id="i-unit"><option>PCS</option><option>KG</option><option>L</option><option>MTR</option><option>BOX</option><option>SET</option></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Min Stock Level</label><input id="i-min" type="number" value="0" min="0"/></div>
      <div class="field"><label>Unit Cost (SAR)</label><input id="i-cost" type="number" step="0.01" value="0" min="0"/></div>
    </div>
    <div class="field"><label>Location</label><input id="i-loc" placeholder="A-01-1"/></div>`,

     <button class="btn btn-accent" onclick="saveInventoryItem()">Add Item</button>`);
}

async function saveInventoryItem() {
  const body = {
    sku: document.getElementById('i-sku').value.trim(),
    name: document.getElementById('i-name').value.trim(),
    customer_name: document.getElementById('i-cust').value,
    qty: +document.getElementById('i-qty').value,
    unit: document.getElementById('i-unit').value,
    min_level: +document.getElementById('i-min').value,
    unit_cost: +document.getElementById('i-cost').value,
    location: document.getElementById('i-loc').value.trim(),
  };
  if (!body.name) { toast('Item name is required','error'); return; }
  try {
    await API('/inventory', {method:'POST', body:JSON.stringify(body)});
    toast('Item added','success'); closeModal(); renderInventory();
  } catch(e) { toast(e.message,'error'); }
}

async function editInventoryItem(item) {
  const customers = await API('/customers/names').catch(()=>[]);
  const custOpts = customers.map(c=>`<option ${c===item.customer_name?'selected':''}>${c}</option>`).join('');
  openModal('Edit Inventory Item', `
    <div class="field-row">
      <div class="field"><label>SKU</label><input id="i-sku" value="${item.sku||''}" readonly style="background:var(--surface)"/></div>
      <div class="field"><label>Item Name *</label><input id="i-name" value="${item.name||''}"/></div>
    </div>
    <div class="field"><label>Customer</label><select id="i-cust"><option value="">— No Customer —</option>${custOpts}</select></div>
    <div class="field-row">
      <div class="field"><label>Quantity</label><input id="i-qty" type="number" value="${item.qty||0}" min="0"/></div>
      <div class="field"><label>Unit</label><select id="i-unit"><option ${item.unit==='PCS'?'selected':''}>PCS</option><option ${item.unit==='KG'?'selected':''}>KG</option><option ${item.unit==='L'?'selected':''}>L</option><option ${item.unit==='MTR'?'selected':''}>MTR</option><option ${item.unit==='BOX'?'selected':''}>BOX</option><option ${item.unit==='SET'?'selected':''}>SET</option></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Min Stock Level</label><input id="i-min" type="number" value="${item.min_level||0}" min="0"/></div>
      <div class="field"><label>Unit Cost (SAR)</label><input id="i-cost" type="number" step="0.01" value="${item.unit_cost||0}" min="0"/></div>
    </div>
    <div class="field"><label>Location</label><input id="i-loc" value="${item.location||''}"/></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-accent" onclick="updateInventoryItem('${item.id}')">Save Changes</button>`);
}

async function updateInventoryItem(id) {
  const body = {
    name: document.getElementById('i-name').value.trim(),
    customer_name: document.getElementById('i-cust').value,
    qty: +document.getElementById('i-qty').value,
    unit: document.getElementById('i-unit').value,
    min_level: +document.getElementById('i-min').value,
    unit_cost: +document.getElementById('i-cost').value,
    location: document.getElementById('i-loc').value.trim(),
  };
  try {
    await API(`/inventory/${id}`, {method:'PUT', body:JSON.stringify(body)});
    toast('Item updated','success'); closeModal(); renderInventory();
  } catch(e) { toast(e.message,'error'); }
}

async function deleteInventoryItem(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    await API(`/inventory/${id}`, {method:'DELETE'});
    toast('Item deleted','success'); renderInventory();
  } catch(e) { toast(e.message,'error'); }
}

async function bulkEditSelected() {
  if (!selectedItems.size) { toast('Select items first','info'); return; }
  const customers = await API('/customers/names').catch(()=>[]);
  const custOpts = customers.map(c=>`<option>${c}</option>`).join('');
  openModal(`Bulk Edit ${selectedItems.size} Items`, `
    <p class="text-muted" style="margin-bottom:16px">Only filled fields will be applied to all selected items.</p>
    <div class="field"><label>Reassign Customer</label><select id="be-cust"><option value="">— Keep Existing —</option>${custOpts}</select></div>
    <div class="field-row">
      <div class="field"><label>Min Stock Level</label><input id="be-min" type="number" placeholder="Leave blank to skip"/></div>
      <div class="field"><label>Unit Cost (SAR)</label><input id="be-cost" type="number" step="0.01" placeholder="Leave blank to skip"/></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Location</label><input id="be-loc" placeholder="Leave blank to skip"/></div>
      <div class="field"><label>Unit</label><select id="be-unit"><option value="">— Keep Existing —</option><option>PCS</option><option>KG</option><option>L</option><option>MTR</option><option>BOX</option><option>SET</option></select></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-accent" onclick="saveBulkEdit()">Apply to ${selectedItems.size} Items</button>`);
}

async function saveBulkEdit() {
  const update = {};
  const cust = document.getElementById('be-cust').value;
  const min = document.getElementById('be-min').value;
  const cost = document.getElementById('be-cost').value;
  const loc = document.getElementById('be-loc').value;
  const unit = document.getElementById('be-unit').value;
  if (cust) update.customer_name = cust;
  if (min !== '') update.min_level = +min;
  if (cost !== '') update.unit_cost = +cost;
  if (loc) update.location = loc;
  if (unit) update.unit = unit;
  if (!Object.keys(update).length) { toast('No changes to apply','info'); return; }
  try {
    const r = await API('/inventory/bulk-update', {method:'POST', body:JSON.stringify({item_ids:[...selectedItems], update})});
    toast(`Updated ${r.updated} items${r.skipped?`, skipped ${r.skipped}`:''}`, 'success');
    closeModal(); clearSelection(); renderInventory();
  } catch(e) { toast(e.message,'error'); }
}

async function bulkDeleteSelected() {
  if (!selectedItems.size) { toast('Select items first','info'); return; }
  if (!confirm(`Delete ${selectedItems.size} items? This cannot be undone.`)) return;
  try {
    const r = await API('/inventory/bulk-delete', {method:'POST', body:JSON.stringify({item_ids:[...selectedItems]})});
    toast(`Deleted ${r.deleted} items`,'success'); clearSelection(); renderInventory();
  } catch(e) { toast(e.message,'error'); }
}

      </div>
      <div class="card"><div class="table-wrap" id="txn-table">${loadingHtml()}</div></div>
    </div>`);
  const names = await API('/customers/names').catch(()=>[]);
  const sel = document.getElementById('txn-cust-filter');
  for (const n of names) { const o = document.createElement('option'); o.value = n; o.textContent = n; sel.appendChild(o); }

let txnData = [];
async function loadTxns() {
  try {
    const cust = (document.getElementById('txn-cust-filter')||{}).value || '';
    if (!cust) { txnData = []; document.getElementById('txn-table').innerHTML = emptyHtml('Select a customer','Stock transactions are shown customer-wise'); return; }
    txnData = await API(`/transactions?limit=300&customer=${encodeURIComponent(cust)}`);
    renderTxnTable();
  } catch(e) { document.getElementById('txn-table').innerHTML = `<p class="text-danger" style="padding:20px">${e.message}</p>`; }
}

function filterTxns() { renderTxnTable(); }
function renderTxnTable() {
  const q = (document.getElementById('txn-search')||{}).value?.toLowerCase() || '';
  const t = (document.getElementById('txn-type-filter')||{}).value || '';
  const rows = txnData.filter(r => (!q || (r.name||'').toLowerCase().includes(q) || (r.sku||'').toLowerCase().includes(q) || (r.ref||'').toLowerCase().includes(q)) && (!t || r.type === t));
  if (!rows.length) { document.getElementById('txn-table').innerHTML = emptyHtml('No transactions found'); return; }
  let html = `<table><thead><tr><th>Date</th><th>Type</th><th>SKU</th><th>Item</th><th>Customer</th><th>Qty</th><th>Reference</th><th>By</th><th>Status</th></tr></thead><tbody>`;
  for (const r of rows) html += `<tr><td class="nowrap">${fmt.date(r.date||r.datetime)}</td><td>${badge(r.type,{IN:'badge-green',OUT:'badge-amber'})}</td><td class="td-mono">${r.sku}</td><td class="fw700">${r.name}</td><td>${r.customer_name||'--'}</td><td class="fw700">${fmt.num(r.qty)}</td><td class="td-mono">${r.ref||'--'}</td><td>${r.by}</td><td>${badge(r.status,{Completed:'badge-green',Pending:'badge-amber'})}</td></tr>`;
  document.getElementById('txn-table').innerHTML = html + `</tbody></table>`;
}

async function getSelectedCustomerForStock() {

  const invOpts = inv.map(i => `<option value="${i.id}">${i.sku} - ${i.name} [Qty:${i.qty}]</option>`).join('');
  const isIN = type === 'IN';
  openModal(`Stock ${type} - Single Item`, `
    <div class="field"><label>Item *</label><select id="s-sku"><option value="">Select Item</option>${invOpts}</select></div>
    <div class="field-row"><div class="field"><label>Quantity *</label><input id="s-qty" type="number" value="1" min="1"/></div><div class="field"><label>Customer</label><input id="s-cust" value="${selectedCustomer}" readonly style="background:var(--surface)"/></div></div>
    <div class="field-row"><div class="field"><label>Reference</label><input id="s-ref" placeholder="${isIN?'PO-2024-001':'DO-2024-001'}"/></div><div class="field"><label>Date</label><input id="s-date" type="date" value="${new Date().toISOString().slice(0,10)}"/></div></div>

async function saveStock(type) {
  const sku = document.getElementById('s-sku').value;
  const qty = +document.getElementById('s-qty').value;
  if (!sku) { toast('Select an item','error'); return; }
  if (qty <= 0) { toast('Quantity must be > 0','error'); return; }
  const body = {type, sku, qty, customer_name: document.getElementById('s-cust').value, ref: document.getElementById('s-ref').value, date: document.getElementById('s-date').value, notes: document.getElementById('s-notes').value};
  if (type === 'IN' && document.getElementById('s-cost')) body.unit_cost = +document.getElementById('s-cost').value;
  try { await API('/transactions', {method:'POST', body:JSON.stringify(body)}); toast(`Stock ${type} recorded`, 'success'); closeModal(); loadTxns(); }
  catch(e) { toast(e.message,'error'); }
}

async function openBulkStockModal() {

  const rows = inv.map(i => `<tr><td><input type="checkbox" class="bulk-check" value="${i.id}"/></td><td class="td-mono">${i.sku}</td><td>${i.name}</td><td>${i.customer_name||'--'}</td><td>${fmt.num(i.qty)}</td><td><input type="number" class="bulk-qty" data-sku="${i.id}" min="1" value="1" style="width:70px;padding:4px 7px;border:1.5px solid var(--surface-3);border-radius:6px;"/></td></tr>`).join('');

async function saveBulkStock() {
  const type = document.getElementById('bs-type').value;
  const ref = document.getElementById('bs-ref').value || 'BULK';
  const date = document.getElementById('bs-date').value;
  const cust = document.getElementById('bs-cust').value;
  const items = [];
  document.querySelectorAll('.bulk-check:checked').forEach(cb => { const qty = +document.querySelector(`.bulk-qty[data-sku="${cb.value}"]`).value; if (qty > 0) items.push({sku:cb.value, qty}); });
  if (!items.length) { toast('Select at least one item','error'); return; }
  try { const r = await API('/transactions/bulk', {method:'POST', body:JSON.stringify({type,ref,date,customer_name:cust,items})}); toast(`Processed ${r.processed} items${r.errors?.length?`, ${r.errors.length} errors`:''}`,'success'); closeModal(); loadTxns(); }
  catch(e) { toast(e.message,'error'); }
}

      type: l.meta?.file_type || '',
      direction: l.meta?.direction === 'download' ? 'Download' : 'Upload',
      status: l.meta?.file_status || (l.status === 'error' ? 'error' : 'done'),
      notes: l.meta?.notes || l.details || ''
    }));

let fileLogData = [];
function filterFileLog() {
  const q = (document.getElementById('filelog-search')||{}).value?.toLowerCase() || '';
  const status = (document.getElementById('filelog-status')||{}).value || '';
  const rows = fileLogData.filter(r => {
    const rowStatus = ['reading','getting data'].includes(r.status) ? 'processing' : r.status;
    const hay = `${r.file} ${r.user} ${r.type} ${r.notes}`.toLowerCase();
    return (!q || hay.includes(q)) && (!status || rowStatus === status);
  });
  if (!rows.length) { document.getElementById('filelog-card').innerHTML = emptyHtml('No file activity found'); return; }
  let html = `<div class="table-wrap"><table><thead><tr><th>Time</th><th>Direction</th><th>File</th><th>Type</th><th>User</th><th>Status</th><th>Notes</th></tr></thead><tbody>`;
  for (const r of rows) {
    const statusLabel = ['reading','getting data'].includes(r.status) ? 'processing' : r.status;
    html += `<tr><td class="text-muted nowrap">${fmt.dt(r.time)}</td><td>${badge(r.direction,{Upload:'badge-blue',Download:'badge-green'})}</td><td class="fw700">${r.file||'--'}</td><td>${(r.type||'--').replace(/_/g,' ')}</td><td>${r.user||'--'}</td><td>${badge(statusLabel,{uploading:'badge-amber',processing:'badge-blue',done:'badge-green',error:'badge-red'})}</td><td class="text-muted">${r.notes||'--'}</td></tr>`;
  }
  document.getElementById('filelog-card').innerHTML = html + `</tbody></table></div>`;
}

async function downloadTemplate(key) {
  const token = localStorage.getItem('wms_token');
  try {
    const response = await fetch(`/api/templates/generate/${encodeURIComponent(key)}`, {
      headers: token ? { Authorization: `Bearer ${token}` } : {}
    });
    if (!response.ok) {
      const data = await response.json().catch(() => ({}));
      throw new Error(data.error || `Download failed (${response.status})`);
    }
    const blob = await response.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${key}_template.xlsx`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast('Template downloaded','success');
  } catch(e) {
    toast(e.message, 'error');
  }
}

async function saveTemplateHeaders() {
  const inputs = document.querySelectorAll('[data-tkey][data-col]');
  const update = {};
  inputs.forEach(inp => {
    const k = inp.dataset.tkey, c = inp.dataset.col;
    if (!inp.value.trim()) return;
    if (!update[k]) update[k] = {};
    update[k][c] = inp.value.trim();
  });
  try {
    await API('/templates/headers', {method:'PUT', body:JSON.stringify(update)});
    toast('Template headers saved','success');
  } catch(e) { toast(e.message,'error'); }
}

function handleTemplateChipKey(event, key) {
  if (event.key !== 'Tab' || event.shiftKey) return;
  const chips = [...document.querySelectorAll(`.template-chip[data-tkey="${key}"]`)];
  if (chips[chips.length - 1] === event.target && event.target.value.trim()) {
    event.preventDefault();
    addTemplateHeader(key);
  }
}

function addTemplateHeader(key) {
  const box = document.querySelector(`[data-chip-box="${key}"]`);
  if (!box) return;
  const col = `custom_${Date.now()}`;
  const input = document.createElement('input');
  input.className = 'template-chip';
  input.dataset.tkey = key;
  input.dataset.col = col;
  input.placeholder = 'Header name';
  input.onkeydown = event => handleTemplateChipKey(event, key);
  box.appendChild(input);
  input.focus();
}

async function downloadFile(url, filename) {
  const token = localStorage.getItem('wms_token');
  try {
    const response = await fetch(url, {headers: token ? {Authorization:`Bearer ${token}`} : {}});
    if (!response.ok) {
      const data = await response.json().catch(()=>({}));
      throw new Error(data.error || `Download failed (${response.status})`);
    }
    const blob = await response.blob();
    const objectUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = objectUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(objectUrl);
    toast('Download ready','success');
  } catch(e) { toast(e.message,'error'); }
}

function openUploadTemplate(type='inventory') {
  openModal(`Upload ${type.replace('_',' ')} Excel`, `
    <div class="field"><label>Upload Type</label><select id="up-type"><option value="inventory" ${type==='inventory'?'selected':''}>Inventory Import</option><option value="stock_in" ${type==='stock_in'?'selected':''}>Stock In</option><option value="stock_out" ${type==='stock_out'?'selected':''}>Stock Out</option><option value="billing" ${type==='billing'?'selected':''}>Billing Import</option></select></div>
    <div class="field"><label>Date</label><input id="up-date" type="date" value="${new Date().toISOString().slice(0,10)}"/></div>

    <p class="text-muted" style="margin-top:10px">Customer name is mandatory in every imported row. Any row errors are saved in upload notes.</p>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-accent" onclick="uploadTemplateFile()">Upload</button>`);

async function uploadTemplateFile() {
  const file = document.getElementById('up-file').files[0];
  if (!file) { toast('Choose an Excel file first','error'); return; }
  const fd = new FormData();
  fd.append('file', file);
  fd.append('type', document.getElementById('up-type').value);
  fd.append('date', document.getElementById('up-date').value);
  const token = localStorage.getItem('wms_token');
  try {
    const response = await fetch('/api/files/upload', {method:'POST', headers: token ? {Authorization:`Bearer ${token}`} : {}, body: fd});
    const data = await response.json().catch(()=>({}));
    if (!response.ok) throw new Error(data.error || 'Upload failed');
    toast(`Upload ${data.status || 'done'}`,'success');
    closeModal();
    if (currentPage === 'inventory') renderInventory();
    if (currentPage === 'stockio') renderStockIO();
    if (currentPage === 'billing') renderBilling();
    if (currentPage === 'filelog') renderFileLog();
  } catch(e) { toast(e.message,'error'); }
}

function renderAdminPanel(tab='employees') {
  if (currentUser.role !== 'Admin') { setMain(`<div class="page-body">${emptyHtml('Admin access required')}</div>`); return; }

  if (tab === 'employees') return renderAdminEmployees();
  if (tab === 'templates') return renderAdminTemplates();
  if (tab === 'logs') return renderAdminLogs();
  if (tab === 'uploads') return renderAdminUploads();
  if (tab === 'backup') return renderAdminBackup();
  return renderAdminSettings();
}

async function doLogin() {
  const un = document.getElementById('login-username').value.trim();
  const pw = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!un||!pw) { errEl.textContent='Enter username and password'; errEl.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Signing in…';
  try {
    const data = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:un,password:pw})
    }).then(async r=>{ const d=await r.json(); if(!r.ok) throw new Error(d.error||'Login failed'); return d; });
    localStorage.setItem('wms_token', data.token);
    localStorage.setItem('wms_session_expires_at', data.expires_at || new Date(Date.now()+3*60*60*1000).toISOString());
    currentUser = data.user;
    launchApp();
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display='block';
    btn.disabled=false; btn.textContent='Sign in';
  }
}

function launchApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('active');
  buildSidebar();
  startSessionTimer();
  navigate('dashboard');
}

async function doLogout() {
  try { await API('/auth/logout', {method:'POST'}); } catch(e){}
  localStorage.removeItem('wms_token');
  localStorage.removeItem('wms_session_expires_at');
  if (sessionTimer) clearInterval(sessionTimer);
  currentUser = null;
  document.getElementById('app').classList.remove('active');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-username').value='';
  document.getElementById('login-password').value='';
  document.getElementById('login-error').style.display='none';
}

function startSessionTimer() {
  if (sessionTimer) clearInterval(sessionTimer);
  updateSessionCountdown();
  sessionTimer = setInterval(updateSessionCountdown, 1000);
}

function updateSessionCountdown() {
  const bar = document.getElementById('session-bar');
  const label = document.getElementById('session-countdown');
  if (!bar || !label) return;
  const expiresAt = new Date(localStorage.getItem('wms_session_expires_at') || 0).getTime();
  const remaining = Math.max(0, Math.floor((expiresAt - Date.now()) / 1000));
  if (!expiresAt || remaining > 20 * 60) {
    bar.classList.remove('active');
    return;
  }
  if (remaining <= 0) {
    bar.classList.add('active');
    label.textContent = '00:00';
    toast('Session expired. Please sign in again.', 'error', 5000);
    doLogout();
    return;
  }
  const m = String(Math.floor(remaining / 60)).padStart(2, '0');
  const s = String(remaining % 60).padStart(2, '0');
  label.textContent = `${m}:${s}`;
  bar.classList.add('active');
}

      const user = await fetch('/api/auth/me',{headers:{Authorization:`Bearer ${token}`}}).then(r=>{ if(!r.ok) throw new Error(); return r.json(); });

    } catch(e) { localStorage.removeItem('wms_token'); }
  }
})();
